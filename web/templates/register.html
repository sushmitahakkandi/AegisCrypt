<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisCrypt — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-gradient-animate flex items-center justify-center min-h-screen">
    <div id="toast-container" class="fixed top-4 right-4 z-50 w-80"></div>

    <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 mb-4 shadow-lg shadow-blue-500/20">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Create Account</h1>
            <p class="text-slate-400 mt-1">Join AegisCrypt</p>
        </div>

        <div class="glass-card">
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Username</label>
                    <input type="text" id="username" class="input-field" placeholder="johndoe" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Email</label>
                    <input type="email" id="email" class="input-field" placeholder="you@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="Min 8 characters" required
                        minlength="8">
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-1">Confirm Password</label>
                    <input type="password" id="confirm_password" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-full justify-center">Create Account</button>
            </form>
            <p class="text-center text-slate-400 text-sm mt-4">
                Already have an account? <a href="/" class="text-blue-400 hover:text-blue-300">Sign In</a>
            </p>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirm_password').value;
            if (pw !== cpw) { showToast('Passwords do not match', 'error'); return; }

            try {
                await apiFetch('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: pw,
                    }),
                });
                showToast('Account created! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = '/', 1500);
            } catch (err) {
                showToast(err.error || 'Registration failed', 'error');
            }
        }
    </script>
</body>

</html>
